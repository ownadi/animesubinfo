name: Build Kodi add-on

on:
  push:
    tags:
      - 'animesubinfo-kodi-v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Build installable Kodi add-on
      run: python packages/animesubinfo-kodi/scripts/build_addon.py

    - name: Upload Kodi add-on ZIP
      uses: actions/upload-artifact@v4
      with:
        name: kodi-addon-${{ github.ref_name }}
        path: dist/service.subtitles.animesubinfo-*.zip
        if-no-files-found: error
        compression-level: 0
